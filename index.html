<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Generator YLT 2026 - Presisi 300 DPI</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 30px; 
            max-width: 1100px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
            justify-content: center;
        }

        .header-logo {
            flex-basis: 100%;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .header-logo img { max-width: 300px; height: auto; }

        .form-section { flex: 1; min-width: 350px; }
        .form-group { margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        
        input[type="text"], input[type="file"] { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }

        small { display: block; margin-top: 5px; font-size: 12px; color: #666; }

        #crop-area { display: none; margin-top: 15px; border: 2px dashed #8b0000; padding: 10px; background: #fffcfc; border-radius: 8px; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn-crop { background: #27ae60; color: white; margin-top: 10px; }
        .btn-crop:hover { background: #219150; }
        
        .btn-download { background: #8b0000; color: white; font-size: 16px; margin-top: 10px; }
        .btn-download:hover { background: #a50000; }

        /* Preview ID Card */
        #card-to-export { 
            width: 350px; height: 560px; position: relative; 
            background-image: url('template.jpg'); background-size: 100% 100%; 
            border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
        }

        .photo-container { 
            position: absolute; width: 176px; height: 245px; top: 20px; left: 87px; 
            display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }
        
        #output-photo { width: 100%; height: 100%; object-fit: cover; display: none; }

        .text-overlay { position: absolute; width: 100%; top: 312px; color: white; text-align: center; }
        #output-name { font-size: 18px; font-weight: 900; text-transform: uppercase; padding: 0 20px; margin-bottom: 24px; }
        
        .social-container { margin-left: 78px; font-size: 13px; font-weight: 800; text-align: left; }
        .social-row { height: 33px; display: flex; align-items: center; }

        footer { width: 100%; text-align: center; padding: 30px; color: #666; font-size: 14px; }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-logo">
            <img src="logo_landscape.png" alt="Logo YLT">
        </div>

        <div class="form-section">
            <h2 style="margin-top:0; color: #8b0000;">ID Card Generator</h2>
            
            <form id="id-card-form">
                <div class="form-group">
                    <label>1. Foto Profil (Wajib di-crop):</label>
                    <input type="file" id="input-photo-file" accept="image/*" required>
                    <div id="crop-area">
                        <div id="croppie-container"></div>
                        <button type="button" class="btn btn-crop" id="btn-crop-done">PASANG FOTO</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>2. Nama Lengkap (Maks. 23 Karakter):</label>
                    <input type="text" id="input-name" maxlength="23" placeholder="KOMANG WIWEKA PREMANA" required>
                    <small id="name-count">0 / 23 Karakter</small>
                </div>

                <div class="form-group">
                    <label>3. Username Sosial Media (Wajib):</label>
                    <input type="text" id="in-fb" placeholder="Facebook" required style="margin-bottom:8px">
                    <input type="text" id="in-ig" placeholder="Instagram" required style="margin-bottom:8px">
                    <input type="text" id="in-yt" placeholder="Youtube" required style="margin-bottom:8px">
                    <input type="text" id="in-tt" placeholder="TikTok" required>
                </div>

                <button type="submit" class="btn btn-download">
                    <i class="fa-solid fa-download"></i> DOWNLOAD PNG (300 DPI)
                </button>
            </form>
        </div>

        <div class="preview-section">
            <div id="card-to-export">
                <div class="photo-container">
                    <img id="output-photo" src="">
                </div>
                <div class="text-overlay">
                    <div id="output-name">NAMA LENGKAP</div>
                    <div class="social-container">
                        <div class="social-row" id="out-fb">fb_username</div>
                        <div class="social-row" id="out-ig">ig_username</div>
                        <div class="social-row" id="out-yt">yt_username</div>
                        <div class="social-row" id="out-tt">tt_username</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 YLT Organizer. All Rights Reserved. <br> 
        <span style="font-size: 12px; opacity: 0.8;">Youth Leadership Training - Nothing Is Impossible</span></p>
    </footer>

    <script>
        // --- 1. Sinkronisasi Input ---
        const fields = [
            { in: 'input-name', out: 'output-name' },
            { in: 'in-fb', out: 'out-fb' },
            { in: 'in-ig', out: 'out-ig' },
            { in: 'in-yt', out: 'out-yt' },
            { in: 'in-tt', out: 'out-tt' }
        ];

        fields.forEach(f => {
            document.getElementById(f.in).addEventListener('input', (e) => {
                let value = e.target.value.toUpperCase();
                document.getElementById(f.out).innerText = value || e.target.placeholder;
                
                if(f.in === 'input-name') {
                    const counter = document.getElementById('name-count');
                    counter.innerText = `${value.length} / 23 Karakter`;
                    counter.style.color = value.length >= 23 ? 'red' : '#666';
                }
            });
        });

        // --- 2. Logika Potong Foto (Croppie) ---
        let basicCrop = new Croppie(document.getElementById('croppie-container'), {
            viewport: { width: 176, height: 245, type: 'square' },
            boundary: { width: 280, height: 320 },
            showZoomer: true
        });

        document.getElementById('input-photo-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('crop-area').style.display = 'block';
                basicCrop.bind({ url: ev.target.result });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('btn-crop-done').addEventListener('click', function() {
            basicCrop.result({ type: 'base64', size: { width: 800, height: 1114 }, format: 'png', quality: 1 }).then(function(img) {
                document.getElementById('crop-area').style.display = 'none';
                const photoEl = document.getElementById('output-photo');
                photoEl.src = img;
                photoEl.style.display = 'block';
            });
        });

        // --- 3. Logika Download 300 DPI Presisi ---
        document.getElementById('id-card-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const photoSrc = document.getElementById('output-photo').src;
            if (!photoSrc || photoSrc === window.location.href) {
                alert("Silakan potong dan pasang foto profil terlebih dahulu!");
                return;
            }
            processDownload();
        });

        async function processDownload() {
            const card = document.getElementById('card-to-export');
            const scrollPos = window.scrollY;
            window.scrollTo(0, 0);

            try {
                const canvas = await html2canvas(card, {
                    scale: 4, 
                    useCORS: true,
                    backgroundColor: null,
                    width: 350,
                    height: 560
                });

                // Resize ke 650x1028 (300 DPI standar ATM)
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = 650;
                finalCanvas.height = 1028;
                const ctx = finalCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0, finalCanvas.width, finalCanvas.height);

                const base64Image = finalCanvas.toDataURL('image/png');
                const blob = await create300DpiBlob(base64Image);

                const link = document.createElement('a');
                link.download = `ID-CARD-${document.getElementById('input-name').value}.png`;
                link.href = URL.createObjectURL(blob);
                link.click();
            } catch (err) {
                console.error(err);
                alert("Gagal mendownload gambar.");
            } finally {
                window.scrollTo(0, scrollPos);
            }
        }

        async function create300DpiBlob(base64Str) {
            const res = await fetch(base64Str);
            const blob = await res.blob();
            const arrayBuffer = await blob.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);

            // Chunk pHYs Valid untuk 300 DPI (11811 pixels per meter)
            const physChunk = new Uint8Array([
                0, 0, 0, 9, 112, 72, 89, 115, 0, 0, 46, 35, 0, 0, 46, 35, 1, 73, 123, 27, 232
            ]);

            const chunks = [uint8Array.slice(0, 33), physChunk, uint8Array.slice(33)];
            return new Blob(chunks, { type: 'image/png' });
        }
    </script>
</body>
</html>
