<body>

    <div class="container">
        <div class="header-logo" style="width: 100%; text-align: center; margin-bottom: 20px;">
            <img src="logo_lanscape.png" alt="Logo YLT" style="max-width: 300px; height: auto;">
        </div>
        <div class="form-section">
            <h2 style="margin-top:0; color: #8b0000;">YLT 2026 ID Generator</h2>

            <div class="form-group">
                <label>1. Pilih Foto Profil:</label>
                <input type="file" id="input-photo-file" accept="image/*">
                <div id="crop-area">
                    <div id="croppie-container"></div>
                    <button class="btn btn-crop" id="btn-crop-done">Potong & Pasang Foto</button>
                </div>
            </div>

            <div class="form-group">
                <label>2. Nama Lengkap:</label>
                <input type="text" id="input-name" placeholder="KOMANG WIWEKA PREMANA" required>
                <small id="name-count" style="color: #666;">0 / 23 Karakter</small>
            </div>

            <div class="form-group">
                <label>3. Data Sosial Media:</label>
                <input type="text" id="in-fb" placeholder="Username Facebook" style="margin-bottom:5px" required>
                <input type="text" id="in-ig" placeholder="Username Instagram" required style="margin-bottom:5px">
                <input type="text" id="in-yt" placeholder="Username Youtube" required style="margin-bottom:5px">
                <input type="text" id="in-tt" placeholder="Username TikTok" required>
            </div>

            <button class="btn btn-download" onclick="downloadCard()">
                <i class="fa-solid fa-download"></i> DOWNLOAD HASIL KARTU
            </button>
        </div>

        <div class="preview-section">
            <div id="card-to-export">
                <div class="photo-container">
                    <img id="output-photo" src="">
                </div>

                <div class="text-overlay">
                    <div id="output-name">NAMA LENGKAP</div>

                    <div class="social-container">
                        <div class="social-row" id="out-fb">fb_username</div>
                        <div class="social-row" id="out-ig">ig_username</div>
                        <div class="social-row" id="out-yt">yt_username</div>
                        <div class="social-row" id="out-tt">tt_username</div>
                    </div>
                </div>
            </div>
        </div>
        <footer style="width: 100%; text-align: center; padding: 20px; color: #666; font-size: 14px;">
            <p>&copy; 2026 IT TEAM. All Rights Reserved. <br>
                <span style="font-size: 12px;">Youth Leadership Training - Nothing Is Impossible</span>
            </p>
        </footer>
    </div>

    <script>
        // Sinkronisasi Teks
        const fields = [
            { in: 'input-name', out: 'output-name', def: 'NAMA LENGKAP' },
            { in: 'in-fb', out: 'out-fb', def: 'fb_username' },
            { in: 'in-ig', out: 'out-ig', def: 'ig_username' },
            { in: 'in-yt', out: 'out-yt', def: 'yt_username' },
            { in: 'in-tt', out: 'out-tt', def: 'tt_username' }
        ];

        fields.forEach(f => {
            document.getElementById(f.in).addEventListener('input', (e) => {
                document.getElementById(f.out).innerText = e.target.value.toUpperCase() || f.def;
            });
        });

        // Logika Croppie
        let basicCrop = new Croppie(document.getElementById('croppie-container'), {
            viewport: { width: 176, height: 245, type: 'square' },
            boundary: { width: 300, height: 350 },
            showZoomer: true
        });

        document.getElementById('input-name').addEventListener('input', function (e) {
            let val = e.target.value.toUpperCase();

            if (val.length > 23) {
                val = val.substring(0, 23);
            }

            e.target.value = val;

            const el = document.getElementById('output-name');
            el.innerText = val || 'TULIS NAMA';

            adjustFontSize();
        });

        // Listener untuk menghitung karakter nama secara real-time
        document.getElementById('input-name').addEventListener('input', function () {
            const length = this.value.length;
            const counter = document.getElementById('name-count');
            counter.innerText = `${length} / 23 Karakter`;

            // Beri warna merah jika sudah mencapai batas
            if (length >= 23) {
                counter.style.color = 'red';
                counter.style.fontWeight = 'bold';
            } else {
                counter.style.color = '#666';
                counter.style.fontWeight = 'normal';
            }
        });

        // Ganti logika tombol download agar mengecek validasi form
        document.getElementById('id-card-form').addEventListener('submit', function (e) {
            e.preventDefault(); // Mencegah reload halaman

            // Cek apakah foto sudah dipasang
            const photoSrc = document.getElementById('output-photo').src;
            if (!photoSrc || photoSrc === window.location.href) {
                alert("Silakan potong dan pasang foto profil terlebih dahulu!");
                return;
            }

            // Jika semua valid, jalankan fungsi download
            downloadCard();
        });

        document.getElementById('input-photo-file').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('crop-area').style.display = 'block';
                basicCrop.bind({ url: ev.target.result });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // document.getElementById('btn-crop-done').addEventListener('click', function () {
        //     basicCrop.result({ type: 'base64', size: 'viewport', format: 'png' }).then(function (img) {
        //         document.getElementById('crop-area').style.display = 'none';
        //         document.getElementById('output-photo').src = img;
        //         document.getElementById('output-photo').style.display = 'block';
        //     });
        // });
        document.getElementById('btn-crop-done').addEventListener('click', function () {
            // Ubah size menjadi 'original' atau angka pixel tinggi agar tidak pecah
            basicCrop.result({
                type: 'base64',
                size: { width: 1200, height: 1670 }, // Resolusi tinggi (rasio 176:245)
                format: 'png',
                quality: 1 // Kualitas tertinggi (0-1)
            }).then(function (img) {
                document.getElementById('crop-area').style.display = 'none';
                const photoEl = document.getElementById('output-photo');
                photoEl.src = img;
                photoEl.style.display = 'block';
            });
        });

        // Download
        // function downloadCard() {
        //     const card = document.getElementById('card-to-export');
        //     html2canvas(card, { scale: 3, useCORS: true }).then(canvas => {
        //         const link = document.createElement('a');
        //         link.download = 'ID-CARD-' + (document.getElementById('input-name').value || 'USER') + '.png';
        //         link.href = canvas.toDataURL('image/png');
        //         link.click();
        //     });
        // }

        // function downloadCard() {
        //     const card = document.getElementById('card-to-export');
        //     const scrollPos = window.scrollY;
        //     window.scrollTo(0, 0);

        //     html2canvas(card, {
        //         scale: 1, // Gunakan scale 4 untuk hasil sangat tajam (HD)
        //         useCORS: true,
        //         backgroundColor: null,
        //         width: 350,
        //         height: 560
        //     }).then(canvas => {
        //         const link = document.createElement('a');
        //         link.download = 'ID-CARD-' + (document.getElementById('input-name').value || 'USER') + '.png';
        //         link.href = canvas.toDataURL('image/png', 1.0); // 1.0 = Kualitas 100%
        //         link.click();
        //         window.scrollTo(0, scrollPos);
        //     });
        // }
        async function downloadCard() {
            const card = document.getElementById('card-to-export');
            const nameInput = document.getElementById('input-name').value || 'USER';
            const scrollPos = window.scrollY;
            window.scrollTo(0, 0);

            try {
                const canvas = await html2canvas(card, {
                    scale: 4,
                    useCORS: true,
                    backgroundColor: null,
                    width: 350,
                    height: 557
                });

                // 1. Resize ke 650x1028
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = 650;
                finalCanvas.height = 1028;
                const ctx = finalCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0, finalCanvas.width, finalCanvas.height);

                // 2. Ambil data asli
                const base64Image = finalCanvas.toDataURL('image/png');

                // 3. Suntik DPI (300) dengan metode Blobs yang aman
                const blob = await create300DpiBlob(base64Image);

                // 4. Proses Download
                const link = document.createElement('a');
                link.download = `ID-CARD-300DPI-${nameInput}.png`;
                link.href = URL.createObjectURL(blob);
                link.click();

            } catch (err) {
                console.error("Error generating card:", err);
                alert("Terjadi kesalahan saat membuat gambar.");
            } finally {
                window.scrollTo(0, scrollPos);
            }
        }

        // Fungsi pembentuk file PNG dengan Metadata 300 DPI yang Valid
        async function create300DpiBlob(base64Str) {
            const res = await fetch(base64Str);
            const blob = await res.blob();
            const arrayBuffer = await blob.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);

            // Definisikan chunk pHYs untuk 300 DPI (11811 pixels per meter)
            // Struktur: Length (4 bytes), Tag (4 bytes), Data (9 bytes), CRC (4 bytes)
            const physChunk = new Uint8Array([
                0, 0, 0, 9,             // Length: 9 bytes
                112, 72, 89, 115,       // Tag: pHYs
                0, 0, 46, 35,           // X: 11811 ppm (300 DPI)
                0, 0, 46, 35,           // Y: 11811 ppm
                1,                      // Unit: meters
                73, 123, 27, 232        // CRC Checksum untuk data di atas
            ]);

            const newChunks = [];
            // Header PNG + IHDR (biasanya 33 byte pertama)
            newChunks.push(uint8Array.slice(0, 33));
            // Masukkan chunk pHYs
            newChunks.push(physChunk);
            // Masukkan sisa data gambar
            newChunks.push(uint8Array.slice(33));

            return new Blob(newChunks, { type: 'image/png' });
        }
    </script>
